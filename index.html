<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booyah Day - Storage Warehouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060608;
            color: #f1f5f9;
            background-image: radial-gradient(circle at top right, rgba(255, 185, 0, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255, 75, 0, 0.05), transparent 40%);
            background-attachment: fixed;
        }
        .font-ff {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
        }
        .glass-card {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 185, 0, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        .btn-ff {
            position: relative;
            background: linear-gradient(90deg, #ff9900 0%, #ff4b00 100%);
            color: #fff;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            border: none;
            transition: all 0.25s ease;
        }
        .btn-ff::before {
            content: '';
            position: absolute;
            inset: 1px;
            background: linear-gradient(90deg, #e68a00 0%, #cc3c00 100%);
            clip-path: polygon(9px 0, 100% 0, 100% calc(100% - 9px), calc(100% - 9px) 100%, 0 100%, 0 9px);
            z-index: -1;
        }
        .btn-ff:hover {
            filter: brightness(1.15);
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.4);
        }
        .btn-ff:active {
            transform: scale(0.97);
        }
        .input-ff {
            background: rgba(10, 10, 12, 0.85);
            border: 1px solid rgba(255, 185, 0, 0.25);
            color: white;
            transition: all 0.3s ease;
        }
        .input-ff:focus {
            border-color: #ffb900;
            box-shadow: 0 0 10px rgba(255, 185, 0, 0.25);
            outline: none;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 185, 0, 0.25); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 185, 0, 0.5); }
        
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .toggle-btn .chevron { transition: transform 0.3s ease; }
        .toggle-btn.collapsed .chevron { transform: rotate(-90deg); }

        @keyframes popIn {
            from { transform: scale(0.97); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-6xl mb-8 flex items-center gap-4 border-b border-[#ffb900]/20 pb-4">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#ffb900] to-[#ff4b00] flex items-center justify-center text-black font-extrabold shadow-[0_0_15px_rgba(255,185,0,0.3)]">B</div>
        <div>
            <h1 class="text-2xl font-ff text-white tracking-widest leading-none">BOOYAH STORAGE</h1>
            <span class="text-[9px] text-[#ffb900] font-bold uppercase tracking-[0.2em]">Standalone Warehouse Module</span>
        </div>
    </div>

    <!-- MAIN STORAGE SECTION -->
    <main class="w-full max-w-6xl flex flex-col gap-6 animate-pop">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            
            <!-- ADD/EDIT TO STORAGE FORM -->
            <div class="glass-card rounded-xl p-5 flex flex-col gap-4 sticky top-10">
                <h3 id="form-title" class="text-xs font-bold text-[#ffb900] uppercase tracking-widest border-b border-gray-800 pb-2 flex items-center gap-2">
                    <span>📦</span> ADD TO STORAGE
                </h3>
                
                <!-- Hidden Input for Edit ID -->
                <input type="hidden" id="edit-stg-id">

                <div class="flex flex-col gap-3 text-xs">
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest pl-1">Item Name</label>
                        <input type="text" id="stg-item-name" class="input-ff w-full rounded-lg p-3 mt-1 font-bold" placeholder="e.g. Dragon Bundle">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest pl-1">Description</label>
                        <textarea id="stg-item-desc" class="input-ff w-full rounded-lg p-3 mt-1 text-xs" placeholder="Optional description..." rows="2"></textarea>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest pl-1">Image URL</label>
                        <div class="flex gap-2 mt-1">
                            <input type="text" id="stg-item-image" class="input-ff flex-1 rounded-lg p-3 font-mono text-xs" placeholder="https://...">
                            <label class="bg-gray-800 border border-gray-600 hover:border-white px-3 text-[9px] font-bold uppercase tracking-wider cursor-pointer rounded-lg flex items-center justify-center shrink-0">
                                Upload
                                <input type="file" accept="image/*" class="hidden" onchange="uploadAdminImage(this, 'stg-item-image')">
                            </label>
                        </div>
                    </div>
                    
                    <!-- Popup Category Selector -->
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest pl-1">Category</label>
                        <div class="flex gap-2 mt-1 relative">
                            <input type="hidden" id="stg-item-category-id">
                            <input type="text" id="stg-item-category-name" readonly class="input-ff flex-1 rounded-lg p-3 font-bold text-xs cursor-pointer bg-[#0a0a0c]" placeholder="Click to choose category..." onclick="openCategoryModal()">
                            <button onclick="openCategoryModal()" class="bg-gray-800 border border-gray-600 hover:border-[#ffb900] hover:text-[#ffb900] px-4 text-[9px] font-bold uppercase tracking-wider rounded-lg transition-colors shrink-0">Select</button>
                        </div>
                    </div>

                    <div class="flex gap-2 mt-2">
                        <button id="btn-save-stg" onclick="saveStorageItem()" class="btn-ff flex-1 font-bold py-3 text-[10px] uppercase tracking-widest"><span class="relative z-10" id="btn-save-text">Save to Storage</span></button>
                        <button id="btn-cancel-stg" onclick="resetStorageForm()" class="hidden bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-3 px-5 text-[10px] uppercase tracking-widest rounded-lg transition-colors">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- STORAGE ITEMS LIST -->
            <div class="lg:col-span-2 glass-card rounded-xl p-5 flex flex-col gap-4">
                <div onclick="toggleCollapse(this)" class="toggle-btn cursor-pointer flex items-center justify-between border-b border-gray-800 pb-2 select-none">
                    <h3 class="text-xs font-bold text-white uppercase tracking-widest">STORAGE ITEMS WAREHOUSE</h3>
                    <svg class="chevron w-4 h-4 text-gray-500 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div id="stg-items-list" class="flex flex-col gap-2">
                    <div class="text-center py-6 text-xs text-gray-500 font-bold uppercase tracking-wider">Loading storage...</div>
                </div>
            </div>
            
        </div>
    </main>

    <!-- CATEGORY SELECTION POPUP (MODAL) -->
    <div id="category-modal" class="hidden fixed inset-0 bg-[#060608]/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm rounded-xl p-5 border-t-4 border-t-[#ffb900] flex flex-col gap-4 animate-pop">
            <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                <h3 class="text-xs font-bold text-[#ffb900] uppercase tracking-widest">Select Category</h3>
                <button onclick="closeCategoryModal()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modal-category-list" class="flex flex-col gap-2 max-h-[50vh] overflow-y-auto pr-1">
                <!-- Categories dynamically injected here -->
            </div>
        </div>
    </div>

    <!-- JS Logic -->
    <script>
        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyBwXGyWQEXf-wqAT743px0viDVfKiRGQ0M",
            authDomain: "booyah-day-offical.firebaseapp.com",
            databaseURL: "https://booyah-day-offical-default-rtdb.firebaseio.com",
            projectId: "booyah-day-offical",
            storageBucket: "booyah-day-offical.firebasestorage.app"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. GLOBAL VARIABLES ---
        let globalCategories = {};
        let globalStorage = {};
        const R2_WORKER_URL = "https://file-uploader.lizanislamlemon.workers.dev";
        const R2_PUBLIC_URL = "https://pub-4c6b2dbf3a0c4862a8964b1546de6283.r2.dev";

        // --- 3. FIREBASE LISTENERS ---
        window.onload = () => {
            // Listen to Categories (With Default Category Fallback)
            db.ref("categories").on("value", (snap) => {
                let cats = snap.val() || {};
                
                // --- Default Category Logic Restored ---
                let avatarExists = Object.values(cats).some(c => c.name.toLowerCase() === "avatar");
                if (!avatarExists) {
                    cats["default_avatar_cat"] = {
                        name: "Avatar",
                        status: "Show",
                        destination: "Store",
                        image: ""
                    };
                }
                
                globalCategories = cats;
                renderStorageItems(); // Update category names in list if changed
            });

            // Listen to Storage Items
            db.ref("storage").on("value", (snap) => {
                globalStorage = snap.val() || {};
                renderStorageItems();
            });
        };

        // --- 4. UTILITY FUNCTIONS ---
        function toggleCollapse(el) {
            el.classList.toggle("collapsed");
            let content = el.nextElementSibling;
            if (content) {
                content.classList.toggle("hidden");
            }
        }

        // --- 5. IMAGE UPLOAD LOGIC ---
        function uploadAdminImage(input, targetInputId) {
            if (input.files && input.files[0]) {
                let file = input.files[0];
                let safeName = Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9.]/g, '_');
                let targetEl = document.getElementById(targetInputId);
                targetEl.value = "Uploading...";
                
                let xhr = new XMLHttpRequest();
                xhr.open('PUT', `${R2_WORKER_URL}/upload?filename=${safeName}`);
                xhr.setRequestHeader('X-Folder', 'Free fire');
                xhr.setRequestHeader('X-Tags', 'storage-upload');
                xhr.setRequestHeader('Content-Type', file.type);
                
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        let perc = Math.round((e.loaded / e.total) * 100);
                        targetEl.value = `Uploading... ${perc}%`;
                    }
                };
                
                xhr.onload = () => {
                    targetEl.value = `${R2_PUBLIC_URL}/Free fire/${safeName}`;
                };
                
                xhr.onerror = () => {
                    targetEl.value = '';
                    alert('Upload failed! Check network connection.');
                };
                xhr.send(file);
            }
        }

        // --- 6. CATEGORY MODAL LOGIC ---
        function openCategoryModal() {
            document.getElementById('category-modal').classList.remove('hidden');
            let container = document.getElementById("modal-category-list");
            container.innerHTML = "";
            
            let keys = Object.keys(globalCategories);
            let hasVisibleCategories = false;

            keys.forEach(k => {
                let cat = globalCategories[k];
                if (cat.status === "Show") {
                    hasVisibleCategories = true;
                    container.innerHTML += `
                        <button onclick="selectCategory('${k}', '${cat.name}')" class="flex items-center gap-3 p-3 bg-black/40 border border-gray-800 hover:border-[#ffb900] hover:bg-[#ffb900]/10 rounded-lg text-left transition-all group">
                            ${cat.image ? `<img src="${cat.image}" class="w-8 h-8 rounded-full object-cover border border-gray-700 group-hover:border-[#ffb900]">` : `<div class="w-8 h-8 rounded-full bg-gray-900 border border-gray-700 text-[#ffb900] flex items-center justify-center text-xs font-bold group-hover:border-[#ffb900]">${cat.name.charAt(0)}</div>`}
                            <div class="flex flex-col">
                                <span class="text-[11px] font-bold text-white uppercase tracking-wider group-hover:text-[#ffb900] transition-colors">${cat.name}</span>
                                <span class="text-[8px] text-gray-500 uppercase tracking-widest">${cat.destination || 'Store'}</span>
                            </div>
                        </button>
                    `;
                }
            });

            if (!hasVisibleCategories) {
                container.innerHTML = '<span class="text-[10px] text-gray-500 text-center block py-4 uppercase font-bold tracking-widest">No Active Categories Found</span>';
            }
        }

        function closeCategoryModal() {
            document.getElementById('category-modal').classList.add('hidden');
        }

        function selectCategory(id, name) {
            document.getElementById('stg-item-category-id').value = id;
            document.getElementById('stg-item-category-name').value = name;
            closeCategoryModal();
        }

        // --- 7. STORAGE CRUD LOGIC ---
        function saveStorageItem() {
            let id = document.getElementById("edit-stg-id").value;
            let name = document.getElementById("stg-item-name").value.trim();
            let desc = document.getElementById("stg-item-desc").value.trim();
            let image = document.getElementById("stg-item-image").value.trim();
            let categoryId = document.getElementById("stg-item-category-id").value;

            if (!name || !categoryId) { 
                alert("Item name and category are required."); 
                return; 
            }

            let itemData = {
                name: name,
                description: desc,
                image: image || '',
                categoryId: categoryId
            };

            let ref;
            if (id) {
                // Update existing item
                ref = db.ref("storage/" + id);
            } else {
                // Create new item
                itemData.createdAt = Date.now();
                ref = db.ref("storage").push();
            }
            
            ref.update(itemData).then(() => {
                alert(`"${name}" successfully ${id ? 'updated in' : 'saved to'} storage!`);
                resetStorageForm();
            }).catch(error => {
                alert("Failed to save item: " + error.message);
            });
        }

        function editStorageItem(itemId) {
            let item = globalStorage[itemId];
            if (!item) return;

            document.getElementById("edit-stg-id").value = itemId;
            document.getElementById("stg-item-name").value = item.name || '';
            document.getElementById("stg-item-desc").value = item.description || '';
            document.getElementById("stg-item-image").value = item.image || '';
            
            // Set Category
            document.getElementById("stg-item-category-id").value = item.categoryId || '';
            let catName = globalCategories[item.categoryId] ? globalCategories[item.categoryId].name : 'Unknown';
            document.getElementById("stg-item-category-name").value = catName;

            // Update UI for editing
            document.getElementById("form-title").innerHTML = "<span>✏️</span> EDIT STORAGE ITEM";
            document.getElementById("btn-save-text").innerText = "Update Item";
            document.getElementById("btn-cancel-stg").classList.remove("hidden");
        }

        function resetStorageForm() {
            document.getElementById("edit-stg-id").value = '';
            document.getElementById("stg-item-name").value = '';
            document.getElementById("stg-item-desc").value = '';
            document.getElementById("stg-item-image").value = '';
            document.getElementById("stg-item-category-id").value = '';
            document.getElementById("stg-item-category-name").value = '';
            
            document.getElementById("form-title").innerHTML = "<span>📦</span> ADD TO STORAGE";
            document.getElementById("btn-save-text").innerText = "Save to Storage";
            document.getElementById("btn-cancel-stg").classList.add("hidden");
        }

        function renderStorageItems() {
            let container = document.getElementById("stg-items-list");
            if (!container) return;
            
            let keys = Object.keys(globalStorage).filter(k => globalStorage[k] !== null);
            
            if (keys.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-xs text-gray-500 font-bold uppercase tracking-wider bg-black/20 rounded-lg border border-gray-800 border-dashed">Storage is completely empty</div>';
                return;
            }
            
            // Sort keys by newest first (descending)
            keys.sort((a, b) => (globalStorage[b].createdAt || 0) - (globalStorage[a].createdAt || 0));

            container.innerHTML = keys.map(k => {
                let item = globalStorage[k];
                let catName = globalCategories[item.categoryId] ? globalCategories[item.categoryId].name : 'Unknown Category';
                let itemImage = item.image || 'https://pub-4c6b2dbf3a0c4862a8964b1546de6283.r2.dev/Free fire/1780775687157_1780775598577.png';
                
                return `
                    <div class="flex items-center gap-4 bg-black/40 border border-gray-800 rounded-lg p-3 hover:border-gray-700 transition-colors group">
                        <img src="${itemImage}" class="w-12 h-12 object-contain rounded bg-black/60 border border-gray-800 p-1 group-hover:border-[#ffb900]/40 transition-colors">
                        <div class="flex-1 min-w-0">
                            <span class="text-sm font-bold text-white uppercase tracking-wider block truncate">${item.name}</span>
                            <span class="text-[9px] text-[#ffb900] font-bold uppercase tracking-widest">${catName}</span>
                            ${item.description ? `<p class="text-[10px] text-gray-500 mt-1 truncate">${item.description}</p>` : ''}
                        </div>
                        <div class="flex flex-col md:flex-row gap-2 shrink-0">
                            <button onclick="editStorageItem('${k}')" class="bg-[#ffb900]/10 border border-[#ffb900]/30 hover:bg-[#ffb900] text-[#ffb900] hover:text-black px-3 py-2 text-[9px] uppercase tracking-wider rounded font-extrabold transition-all duration-300">Edit</button>
                            <button onclick="deleteStorageItem('${k}')" class="bg-red-950/40 border border-red-700/50 hover:bg-red-600 text-red-400 hover:text-white px-3 py-2 text-[9px] uppercase tracking-wider rounded font-extrabold transition-all duration-300">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteStorageItem(itemId) {
            if (confirm("Are you sure you want to permanently remove this item from storage?")) {
                db.ref("storage/" + itemId).remove().then(() => {
                    if(document.getElementById("edit-stg-id").value === itemId) {
                        resetStorageForm(); // Reset form if deleting the currently editing item
                    }
                }).catch(error => {
                    alert("Delete failed: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
